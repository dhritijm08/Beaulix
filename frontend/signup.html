<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beaulix - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth.css">
  <style>
    /* signup.html specific styles */
    .login-btn { margin-top: 16px; }
    .toggle-password { position: absolute; right: 16px; background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; stroke: #8A8A8A; transition: stroke 0.3s ease; }
    .toggle-password:hover { stroke: #8C6A4A; }
    .input-wrapper.success input { border-color: #10b981; background-color: #f0fdf4; }
    .form-options { margin-top: -8px; }
    .checkbox-wrapper { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
    .checkbox-wrapper input[type="checkbox"] { width: 20px; height: 20px; margin-top: 2px; cursor: pointer; appearance: none; -webkit-appearance: none; border: 1px solid #8C6A4A; background-color: white; position: relative; transition: all 0.2s ease; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .checkbox-wrapper input[type="checkbox"]:hover { border-color: #7B5940; background-color: #FAF7F4; }
    .checkbox-wrapper input[type="checkbox"]:checked { background-color: #8C6A4A; border-color: #8C6A4A; }
    .checkbox-wrapper input[type="checkbox"]:checked:hover { background-color: #7B5940; border-color: #7B5940; }
    .checkbox-wrapper input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; font-weight: bold; line-height: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .checkbox-wrapper input[type="checkbox"]:focus { outline: none; box-shadow: 0 0 0 3px rgba(140, 106, 74, 0.2); }
    .checkbox-label { font-size: 14px; color: #555555; line-height: 1.5; user-select: none; }
    .inline-link { color: #8C6A4A; text-decoration: none; font-weight: 500; transition: color 0.2s ease; }
    .inline-link:hover { text-decoration: underline; color: #7B5940; }
    .success-toast.error-toast { background: linear-gradient(135deg, #8B4513, #5C2E0E); border-left: 4px solid #3D1F09; box-shadow: 0 8px 30px rgba(92, 46, 14, 0.35); }
    .signup-prompt { text-align: center; font-size: 14px; color: #555555; margin-top: 16px; }
    .signup-link { color: #8C6A4A; text-decoration: none; font-weight: 600; transition: color 0.3s ease; }
    .signup-link:hover { color: #7B5940; text-decoration: underline; }
  </style>
</head>
<body>

<div class="success-toast" id="successToast">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toastIcon">
    <polyline points="20 6 9 17 4 12"></polyline>
  </svg>
  <span id="toastMessage">Account created successfully!</span>
</div>

<section class="login-section">
  <div class="decorative-sparkle sparkle-1">✦</div>
  <div class="decorative-sparkle sparkle-2">✦</div>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><span>BEAULIX</span></div>
      <h1>Create your account and start your journey!</h1>
    </div>
    <form class="login-form-wrapper" id="signupForm" novalidate>

      <div class="input-group">
        <label for="fullname">Full Name</label>
        <div class="input-wrapper" id="fullname-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name" required />
        </div>
        <div class="error-message" id="fullname-error"></div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper" id="email-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 7l9 6 9-6"></path></svg>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required />
        </div>
        <div class="error-message" id="email-error"></div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper" id="password-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path><circle cx="12" cy="16" r="1"></circle></svg>
          <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <div class="error-message" id="password-error"></div>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrapper" id="confirm-password-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path><circle cx="12" cy="16" r="1"></circle></svg>
          <input type="password" id="confirm-password" placeholder="Re-enter your password" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="confirm-password">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <div class="error-message" id="confirm-password-error"></div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="terms" required />
          <span class="checkbox-label">I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a></span>
        </label>
        <div class="error-message" id="terms-error" style="margin-left: 32px;"></div>
      </div>

      <button type="submit" class="login-btn" id="signupBtn">Create Account</button>

      <p class="signup-prompt">Already have an account? <a href="login.html" class="signup-link">Sign in</a></p>
    </form>
  </div>
</section>

<footer>
  <div class="footer-copyright">© 2026 Beaulix. All rights reserved.</div>
</footer>

<script type="module">
  import { app } from './firebase-config.js';
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  const auth = getAuth(app);

  // ── DOM refs ──────────────────────────────────────────────
  const form                 = document.getElementById('signupForm');
  const fullnameInput        = document.getElementById('fullname');
  const emailInput           = document.getElementById('email');
  const passwordInput        = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirm-password');
  const termsCheckbox        = document.getElementById('terms');
  const fullnameError        = document.getElementById('fullname-error');
  const emailError           = document.getElementById('email-error');
  const passwordError        = document.getElementById('password-error');
  const confirmPasswordError = document.getElementById('confirm-password-error');
  const termsError           = document.getElementById('terms-error');
  const signupBtn            = document.getElementById('signupBtn');
  const successToast         = document.getElementById('successToast');
  const toastMessage         = document.getElementById('toastMessage');
  const toastIcon            = document.getElementById('toastIcon');

  // ── Redirect helper ───────────────────────────────────────
  function goToLogin() {
    const path = window.location.pathname;
    const dir  = path.substring(0, path.lastIndexOf('/') + 1);
    window.location.replace(dir + 'login.html');
  }

  // ── Helpers ───────────────────────────────────────────────
  function showError(input, errorEl, msg) {
    if (input?.parentElement) { input.parentElement.classList.add('error'); input.parentElement.classList.remove('success'); }
    if (errorEl) { errorEl.textContent = msg; errorEl.classList.add('show'); }
  }
  function clearError(input, errorEl) {
    if (input?.parentElement) { input.parentElement.classList.remove('error', 'success'); }
    if (errorEl) { errorEl.textContent = ''; errorEl.classList.remove('show'); }
  }
  function showSuccess(input) {
    if (input?.parentElement) { input.parentElement.classList.remove('error'); input.parentElement.classList.add('success'); }
  }
  function showToast(message, type = 'success', duration = 4000) {
    toastMessage.textContent = message;
    if (type === 'error') {
      successToast.classList.add('error-toast');
      toastIcon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
    } else {
      successToast.classList.remove('error-toast');
      toastIcon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
    }
    successToast.classList.add('show');
    setTimeout(() => successToast.classList.remove('show'), duration);
  }
  function getFirebaseErrorMessage(code) {
    const map = {
      'auth/email-already-in-use':  'This email is already registered. Try signing in instead.',
      'auth/invalid-email':         'Invalid email address format.',
      'auth/operation-not-allowed': 'Email/password sign up is not enabled.',
      'auth/weak-password':         'Password is too weak. Use at least 6 characters.',
      'auth/network-request-failed':'Network error. Please check your internet connection.',
      'auth/too-many-requests':     'Too many attempts. Please try again later.',
    };
    return map[code] || 'An unexpected error occurred: ' + code;
  }

  // ── Validators ────────────────────────────────────────────
  function validateFullname() {
    const v = fullnameInput.value.trim();
    if (!v)           { showError(fullnameInput, fullnameError, 'Please enter your full name'); return false; }
    if (v.length < 2) { showError(fullnameInput, fullnameError, 'Name must be at least 2 characters'); return false; }
    if (!/^[a-zA-Z\s'\-]+$/.test(v)) { showError(fullnameInput, fullnameError, 'Name can only contain letters'); return false; }
    clearError(fullnameInput, fullnameError); showSuccess(fullnameInput); return true;
  }
  function validateEmail() {
    const v = emailInput.value.trim();
    if (!v) { showError(emailInput, emailError, 'Please enter your email address'); return false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { showError(emailInput, emailError, 'Please enter a valid email address'); return false; }
    clearError(emailInput, emailError); showSuccess(emailInput); return true;
  }
  function validatePassword() {
    const v = passwordInput.value;
    if (!v)           { showError(passwordInput, passwordError, 'Please create a password'); return false; }
    if (v.length < 8) { showError(passwordInput, passwordError, 'Password must be at least 8 characters'); return false; }
    if (!/[A-Z]/.test(v)) { showError(passwordInput, passwordError, 'Include at least one uppercase letter (A-Z)'); return false; }
    if (!/[a-z]/.test(v)) { showError(passwordInput, passwordError, 'Include at least one lowercase letter (a-z)'); return false; }
    if (!/[0-9]/.test(v)) { showError(passwordInput, passwordError, 'Include at least one number (0-9)'); return false; }
    if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(v)) { showError(passwordInput, passwordError, 'Include at least one special character (!@#$%^&* etc.)'); return false; }
    clearError(passwordInput, passwordError); showSuccess(passwordInput); return true;
  }
  function validateConfirmPassword() {
    const v = confirmPasswordInput.value;
    if (!v) { showError(confirmPasswordInput, confirmPasswordError, 'Please confirm your password'); return false; }
    if (passwordInput.value !== v) { showError(confirmPasswordInput, confirmPasswordError, 'Passwords do not match'); return false; }
    clearError(confirmPasswordInput, confirmPasswordError); showSuccess(confirmPasswordInput); return true;
  }
  function validateTerms() {
    if (!termsCheckbox.checked) { termsError.textContent = 'You must agree to the Terms and Privacy Policy'; termsError.classList.add('show'); return false; }
    termsError.textContent = ''; termsError.classList.remove('show'); return true;
  }

  // ── Signup ────────────────────────────────────────────────
  async function handleSignup(fullname, email, password) {
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="btn-spinner"></span> Creating Account...';
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: fullname });

      showToast('Welcome to Beaulix, ' + fullname + '! Redirecting...');

      form.reset();
      document.querySelectorAll('.input-wrapper').forEach(w => w.classList.remove('success', 'error'));
      document.querySelectorAll('.error-message').forEach(e => { e.classList.remove('show'); e.textContent = ''; });

      setTimeout(goToLogin, 2500);

    } catch (error) {
      const msg = getFirebaseErrorMessage(error.code);
      if (error.code === 'auth/email-already-in-use' || error.code === 'auth/invalid-email') {
        showError(emailInput, emailError, msg); emailInput.focus();
      } else if (error.code === 'auth/weak-password') {
        showError(passwordInput, passwordError, msg); passwordInput.focus();
      } else {
        showToast(msg, 'error');
      }
      signupBtn.disabled = false;
      signupBtn.innerHTML = 'Create Account';
    }
  }

  // ── Form submit ───────────────────────────────────────────
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const v1 = validateFullname();
    const v2 = validateEmail();
    const v3 = validatePassword();
    const v4 = validateConfirmPassword();
    const v5 = validateTerms();
    if (!v1) { fullnameInput.focus(); return; }
    if (!v2) { emailInput.focus(); return; }
    if (!v3) { passwordInput.focus(); return; }
    if (!v4) { confirmPasswordInput.focus(); return; }
    if (!v5) return;
    handleSignup(fullnameInput.value.trim(), emailInput.value.trim(), passwordInput.value);
  });

  // ── Real-time validation ──────────────────────────────────
  fullnameInput.addEventListener('blur', validateFullname);
  emailInput.addEventListener('blur', validateEmail);
  passwordInput.addEventListener('blur', validatePassword);
  confirmPasswordInput.addEventListener('blur', validateConfirmPassword);

  fullnameInput.addEventListener('input', () => clearError(fullnameInput, fullnameError));
  emailInput.addEventListener('input', () => clearError(emailInput, emailError));
  passwordInput.addEventListener('input', () => {
    clearError(passwordInput, passwordError);
    if (confirmPasswordInput.value !== '') validateConfirmPassword();
  });
  confirmPasswordInput.addEventListener('input', () => clearError(confirmPasswordInput, confirmPasswordError));

  termsCheckbox.addEventListener('change', () => {
    if (termsCheckbox.checked) { termsError.textContent = ''; termsError.classList.remove('show'); }
  });

  // ── Toggle password ───────────────────────────────────────
  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', function() {
      const input = document.getElementById(this.getAttribute('data-target'));
      const eyeOpen = this.querySelector('.eye-open');
      const eyeClosed = this.querySelector('.eye-closed');
      if (input.type === 'password') { input.type = 'text'; eyeOpen.style.display = 'none'; eyeClosed.style.display = 'block'; }
      else { input.type = 'password'; eyeOpen.style.display = 'block'; eyeClosed.style.display = 'none'; }
      input.focus();
    });
  });

  // ── Enter key navigation ──────────────────────────────────
  [fullnameInput, emailInput, passwordInput, confirmPasswordInput].forEach((input, i, arr) => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (i < arr.length - 1) arr[i + 1].focus();
        else form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      }
    });
  });
</script>

</body>
</html>
