<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beaulix - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth.css">
  <style>
    /* signup.html specific styles */
    .login-btn { margin-top: 16px; }
    .toggle-password { position: absolute; right: 16px; background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; stroke: #8A8A8A; transition: stroke 0.3s ease; }
    .toggle-password:hover { stroke: #8C6A4A; }
    .input-wrapper.success input { border-color: #10b981; background-color: #f0fdf4; }
    .form-options { margin-top: -8px; }
    .checkbox-wrapper { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
    .checkbox-wrapper input[type="checkbox"] { width: 20px; height: 20px; margin-top: 2px; cursor: pointer; appearance: none; -webkit-appearance: none; border: 1px solid #8C6A4A; background-color: white; position: relative; transition: all 0.2s ease; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .checkbox-wrapper input[type="checkbox"]:hover { border-color: #7B5940; background-color: #FAF7F4; }
    .checkbox-wrapper input[type="checkbox"]:checked { background-color: #8C6A4A; border-color: #8C6A4A; }
    .checkbox-wrapper input[type="checkbox"]:checked:hover { background-color: #7B5940; border-color: #7B5940; }
    .checkbox-wrapper input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; font-weight: bold; line-height: 1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .checkbox-wrapper input[type="checkbox"]:focus { outline: none; box-shadow: 0 0 0 3px rgba(140, 106, 74, 0.2); }
    .checkbox-label { font-size: 14px; color: #555555; line-height: 1.5; user-select: none; }
    .inline-link { color: #8C6A4A; text-decoration: none; font-weight: 500; transition: color 0.2s ease; }
    .inline-link:hover { text-decoration: underline; color: #7B5940; }
    .success-toast.error-toast { background: linear-gradient(135deg, #8B4513, #5C2E0E); border-left: 4px solid #3D1F09; box-shadow: 0 8px 30px rgba(92, 46, 14, 0.35); }
    .signup-prompt { text-align: center; font-size: 14px; color: #555555; margin-top: 16px; }
    .signup-link { color: #8C6A4A; text-decoration: none; font-weight: 600; transition: color 0.3s ease; }
    .signup-link:hover { color: #7B5940; text-decoration: underline; }
  </style>
</head>
<body>

<div class="success-toast" id="successToast">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toastIcon">
    <polyline points="20 6 9 17 4 12"></polyline>
  </svg>
  <span id="toastMessage">Account created successfully!</span>
</div>

<section class="login-section">
  <div class="decorative-sparkle sparkle-1">✦</div>
  <div class="decorative-sparkle sparkle-2">✦</div>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><span>BEAULIX</span></div>
      <h1>Create your account and start your journey!</h1>
    </div>
    <form class="login-form-wrapper" id="signupForm" novalidate>

      <div class="input-group">
        <label for="fullname">Full Name</label>
        <div class="input-wrapper" id="fullname-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name" required />
        </div>
        <div class="error-message" id="fullname-error"></div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper" id="email-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 7l9 6 9-6"></path></svg>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required />
        </div>
        <div class="error-message" id="email-error"></div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper" id="password-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path><circle cx="12" cy="16" r="1"></circle></svg>
          <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <div class="error-message" id="password-error"></div>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrapper" id="confirm-password-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path><circle cx="12" cy="16" r="1"></circle></svg>
          <input type="password" id="confirm-password" placeholder="Re-enter your password" autocomplete="new-password" required />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="confirm-password">
            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
        <div class="error-message" id="confirm-password-error"></div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="terms" required />
          <span class="checkbox-label">I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a></span>
        </label>
        <div class="error-message" id="terms-error" style="margin-left: 32px;"></div>
      </div>

      <button type="submit" class="login-btn" id="signupBtn">Create Account</button>

      <p class="signup-prompt">Already have an account? <a href="login.html" class="signup-link">Sign in</a></p>
    </form>
  </div>
</section>

<footer>
  <div class="footer-copyright">© 2026 Beaulix. All rights reserved.</div>
</footer>



<script type="module" src="signup-module.js"></script>
</body>
</html>
