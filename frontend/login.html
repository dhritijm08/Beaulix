<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beaulix - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth.css">
  <style>
    /* login.html specific styles */
    body { visibility: hidden; }
    .login-btn { margin-top: 16px; }
    .toggle-password { position: absolute; right: 16px; background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; stroke: #8A8A8A; transition: stroke 0.3s ease; }
    .toggle-password:hover { stroke: #8C6A4A; }
    .divider { text-align: center; position: relative; margin: 8px 0; }
    .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: #F1ECE8; }
    .divider span { position: relative; background: white; padding: 0 16px; font-size: 13px; color: #8A8A8A; text-transform: lowercase; }
    .google-btn { width: 100%; padding: 14px; background: white; border: 1px solid #F1ECE8; color: #555555; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { background: #FAF7F4; border-color: #8C6A4A; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(140, 106, 74, 0.1); }
    .input-wrapper.success input { border-color: #10b981; background-color: #f0fdf4; }
    .signup-prompt { text-align: center; font-size: 14px; color: #555555; margin-top: 8px; }
    .signup-link { color: #8C6A4A; text-decoration: none; font-weight: 600; transition: color 0.3s ease; }
    .signup-link:hover { color: #7B5940; text-decoration: underline; }
    @media (max-width: 360px) { .login-btn, .google-btn { padding: 12px; font-size: 14px; } }
  </style>
</head>
<body>

<div class="success-toast" id="successToast">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="20 6 9 17 4 12"></polyline>
  </svg>
  <span id="toastMessage">Login successful!</span>
</div>

<section class="login-section">
  <div class="decorative-sparkle sparkle-1">✦</div>
  <div class="decorative-sparkle sparkle-2">✦</div>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo"><span>BEAULIX</span></div>
      <h1>Welcome back! Sign in to continue</h1>
    </div>
    <form class="login-form-wrapper" id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 7l9 6 9-6"></path></svg>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>
        <div class="error-message" id="email-error"></div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path><circle cx="12" cy="16" r="1"></circle></svg>
          <input type="password" id="password" placeholder="Enter your password" required />
          <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <a href="password-reset.html" class="signup-link" style="font-size: 13px;">Forgot your password?</a>
        <div class="error-message" id="password-error"></div>
      </div>

      <button type="submit" class="login-btn">Sign In</button>

      <div class="divider"><span>or</span></div>

      <button type="button" class="google-btn" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="signup-prompt">Don't have an account? <a href="signup.html" class="signup-link">Sign up</a></p>
      <p class="terms-text">By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
    </form>
  </div>
</section>

<footer>
  <div class="footer-copyright">© 2026 Beaulix. All rights reserved.</div>
</footer>



</body>
</html>
