<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beaulix — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(var(--bg-white), var(--bg-light));
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .error-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 80px;
      background: radial-gradient(circle at top right, var(--bg-light), var(--border), var(--bg-white));
      position: relative;
      overflow: hidden;
    }

    .decorative-sparkle {
      position: absolute;
      font-size: 60px;
      color: rgba(140, 106, 74, 0.1);
      pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }
    .sparkle-1 { top: 10%; left: 15%; animation-delay: 0s; }
    .sparkle-2 { bottom: 15%; right: 20%; animation-delay: 3s; }
    .sparkle-3 { top: 50%; left: 5%; font-size: 30px; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    .error-container {
      width: 100%;
      max-width: 480px;
      background: white;
      padding: 60px 50px;
      box-shadow: 0 20px 60px rgba(140, 106, 74, 0.15);
      border: 1px solid var(--border);
      position: relative;
      text-align: center;
    }

    .error-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--primary-light), var(--primary));
    }

    .error-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .error-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: #000;
      letter-spacing: 2px;
    }

    .error-icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(181, 168, 159, 0.15), rgba(140, 106, 74, 0.15));
      border: 2px solid rgba(140, 106, 74, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .error-icon-circle svg {
      color: var(--primary);
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .error-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 12px;
      font-family: 'Playfair Display', serif;
    }

    .error-body {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      padding: 16px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), rgba(201,164,107,0.4), rgba(255,255,255,0.3), transparent);
      transition: left 0.7s ease;
    }
    .btn-primary:hover::before {
      left: 100%;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #A59990, #7B5940);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(140, 106, 74, 0.4);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: var(--primary);
      padding: 13px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      transition: var(--transition);
      border: 1.5px solid rgba(140, 106, 74, 0.3);
      width: 100%;
    }
    .btn-secondary:hover {
      background: var(--primary-subtle);
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 12px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      background: var(--text-dark);
      color: white;
      padding: 30px 20px;
      text-align: center;
      flex-shrink: 0;
      margin-top: auto;
    }
    .footer-copyright {
      font-size: 14px;
      color: var(--text-light);
    }

    @media (max-width: 520px) {
      .error-container { padding: 48px 28px; }
      .error-code { font-size: 4rem; }
    }
  </style>
</head>
<body>

  <section class="error-section">
    <div class="decorative-sparkle sparkle-1">✦</div>
    <div class="decorative-sparkle sparkle-2">✦</div>
    <div class="decorative-sparkle sparkle-3">✦</div>

    <div class="error-container">
      <div class="error-logo"><span>BEAULIX</span></div>

      <div class="error-icon-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          <line x1="11" y1="8" x2="11" y2="12"></line>
          <line x1="11" y1="16" x2="11.01" y2="16"></line>
        </svg>
      </div>

      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-body">
        The page you're looking for doesn't exist or may have been moved.
        Let's get you back on track.
      </p>

      <div class="error-actions">
        <a href="index.html" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Back to Home
        </a>

        <div class="divider"><span>or</span></div>

        <a href="generator.html" class="btn-secondary">
          Go to Generator
        </a>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-copyright">© 2026 Beaulix. All rights reserved.</div>
  </footer>

</body>
</html>
